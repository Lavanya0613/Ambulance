name: ambulance_app
description: CallHealth Patient Flutter App - Ambulance Booking & Tracking
version: 1.0.0
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP client
  dio: ^5.7.0

  # Map (flutter_map = OpenStreetMap, no API key needed, matches React)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # WebSocket
  socket_io_client: ^2.0.3+1

  # Location
  geolocator: ^13.0.2

  # Storage (JWT token)
  shared_preferences: ^2.3.3

  # Unique IDs (idempotency key)
  uuid: ^4.5.1

  # Phone / URL launch
  url_launcher: ^6.3.1

  # Date formatting
  intl: ^0.19.0

  # Icons (Material)
  material_design_icons_flutter: ^7.0.7296
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
