name: ambulance_app
description: A Flutter app for ambulance requests and tracking (Riverpod, Dio, Google Maps, WebSockets)
version: 0.1.0
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.0.0
  dio: ^5.0.0
  google_maps_flutter: ^2.2.1
  socket_io_client: ^2.0.0
  json_annotation: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.1.0
  json_serializable: ^6.0.0
