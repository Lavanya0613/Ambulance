          enum: [DISPATCHER_OVERRIDE, PATIENT_CONFIRMED, FIELD_CORRECTION, OTHER]
        reasonText:
          type: string
          maxLength: 500

    DispatcherStatusUpdateResponse:
      type: object
      required:
        - requestId
        - previousStatus
        - currentStatus
        - updatedBy
        - updatedAt
        - correlationId
      properties:
        requestId:
          type: string
          format: uuid
        previousStatus:
          $ref: '#/components/schemas/RequestStatus'
        currentStatus:
          $ref: '#/components/schemas/RequestStatus'
        updatedBy:
          type: string
        updatedAt:
          type: string
          format: date-time
        correlationId:
          type: string
          format: uuid

    VendorCreateBookingRequest:
      type: object
      required:
        - requestId
        - requestNumber
        - priority
        - pickup
        - patient
      properties:
        requestId:
          type: string
          format: uuid
        requestNumber:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
        pickup:
          $ref: '#/components/schemas/AddressLocation'
        drop:
          $ref: '#/components/schemas/AddressLocation'
        patient:
          $ref: '#/components/schemas/VendorPatientInfo'
        requiredAmbulanceType:
          type: string
          enum: [bls, als, icu, neonatal]

    VendorCreateBookingResponse:
      type: object
      required:
        - vendorBookingRef
        - accepted
        - status
        - correlationId
      properties:
        vendorBookingRef:
          type: string
        accepted:
          type: boolean
        status:
          $ref: '#/components/schemas/RequestStatus'
        driver:
          $ref: '#/components/schemas/VendorDriverInfo'
        etaSeconds:
          type: integer
          nullable: true
        correlationId:
          type: string
          format: uuid

    VendorTrackingUpdateRequest:
      type: object
      required:
        - vendorBookingRef
        - vendorEventId
        - requestId
        - status
        - location
      properties:
        vendorBookingRef:
          type: string
        vendorEventId:
          type: string
        requestId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/RequestStatus'
        driver:
          $ref: '#/components/schemas/VendorDriverInfo'
        location:
          $ref: '#/components/schemas/VendorTrackingLocation'
        etaSeconds:
          type: integer
          nullable: true

    VendorTrackingUpdateResponse:
      type: object
      required: [accepted, deduplicated, correlationId]
      properties:
        accepted:
          type: boolean
        deduplicated:
          type: boolean
        correlationId:
          type: string
          format: uuid

    VendorWebhookEventRequest:
      type: object
      required:
        - eventId
        - eventType
        - occurredAt
      properties:
        eventId:
          type: string
        eventType:
          type: string
          enum:
            - BOOKING_STATUS_CHANGED
            - DRIVER_ASSIGNED
            - DRIVER_REASSIGNED
            - BOOKING_CANCELLED
            - TRACKING_GAP_ALERT
        occurredAt:
          type: string
          format: date-time
        requestId:
          type: string
          format: uuid
        vendorBookingRef:
          type: string
        payload:
          type: object
          additionalProperties: true

    VendorWebhookEventResponse:
      type: object
      required: [accepted, deduplicated, correlationId]
      properties:
        accepted:
          type: boolean
        deduplicated:
          type: boolean
        correlationId:
          type: string
          format: uuid

    VendorPatientInfo:
      type: object
      required: [name]
      properties:
        name:
          type: string
        phoneE164:
          type: string

    VendorDriverInfo:
      type: object
      properties:
        vendorDriverRef:
          type: string
        name:
          type: string
        phoneE164:
          type: string
        vehicleNumber:
          type: string

    VendorTrackingLocation:
      type: object
      required: [lat, lng, capturedAt]
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        speedKmph:
          type: number
          format: double
        headingDeg:
          type: number
          format: double
        capturedAt:
          type: string
          format: date-time

    AmbulancePublicInfo:
      type: object
      properties:
        driverName:
          type: string
        vehicleNumber:
          type: string
        ambulanceType:
          type: string

    AddressLocation:
      type: object
      required: [lat, lng]
      properties:
        addressLine:
          type: string
        lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
        lng:
          type: number
          format: double
          minimum: -180
          maximum: 180

    GeoPoint:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double

    GeoPointWithTime:
      allOf:
        - $ref: '#/components/schemas/GeoPoint'
        - type: object
          required: [capturedAt]
          properties:
            capturedAt:
              type: string
              format: date-time

    RequestStatus:
      type: string
      enum:
        - NEW
        - PENDING_VENDOR
        - DISPATCHED
        - EN_ROUTE
        - ARRIVED
        - IN_PROGRESS
        - COMPLETED
        - CANCELLATION_IN_PROGRESS
        - CANCELLED
        - FAILED

    PaginationMeta:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0

    ErrorResponse:
      type: object
      required:
        - code
        - message
        - correlationId
        - details
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Request validation failed.
        correlationId:
          type: string
          format: uuid
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      properties:
        field:
          type: string
          example: pickup.lat
        issue:
          type: string
          example: must be between -90 and 90
